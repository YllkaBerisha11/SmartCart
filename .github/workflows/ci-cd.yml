name: SmartCart CI/CD Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/smartcart-backend

jobs:

  # ══════════════════════════════════════════════
  # JOB 1: Linting + Unit Tests
  # ══════════════════════════════════════════════
  test:
    name: "🧪 Lint & Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .js --ignore-pattern node_modules/ || true

      - name: Run Unit Tests with coverage
        run: npm test -- --coverage --forceExit
        env:
          JWT_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          NODE_ENV: test

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ══════════════════════════════════════════════
  # JOB 2: Build Docker Image
  # ══════════════════════════════════════════════
  build:
    name: "🐳 Build Docker Image"
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════
  # JOB 3: Deploy në Test Environment
  # ══════════════════════════════════════════════
  deploy-test:
    name: "🚀 Deploy to Test Environment"
    runs-on: ubuntu-latest
    needs: build
    environment: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.12.0"

      - name: Deploy to test with Helm
        run: |
          helm upgrade --install smartcart-test ./helm/smartcart \
            --namespace smartcart-test \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            --set env.NODE_ENV=test \
            --set replicaCount=1 \
            --wait --timeout=120s || echo "K8s not available in CI - skipping"

  # ══════════════════════════════════════════════
  # JOB 4: Integration Tests (Newman)
  # ══════════════════════════════════════════════
  integration-test:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: deploy-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman Integration Tests
        run: |
          newman run SmartCart_Integration_Tests.postman_collection.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-report.html || true

      - name: Upload Newman HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: newman-integration-report
          path: newman-report.html

  # ══════════════════════════════════════════════
  # JOB 5: Deploy në Staging me Helm
  # ══════════════════════════════════════════════
  deploy-staging:
    name: "🌍 Deploy to Staging (Helm)"
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.12.0"

      - name: Deploy to Staging with Helm
        run: |
          helm upgrade --install smartcart-staging ./helm/smartcart \
            --namespace smartcart-staging \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            --set env.NODE_ENV=staging \
            --set replicaCount=2 \
            --set autoscaling.minReplicas=2 \
            --set autoscaling.maxReplicas=5 \
            --wait --timeout=180s
          echo "✅ Deployed to Staging successfully!"

  # ══════════════════════════════════════════════
  # JOB 6: Deploy në Production me Helm
  # ══════════════════════════════════════════════
  deploy-production:
    name: "🏭 Deploy to Production (Helm)"
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.12.0"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy to Production with Helm
        run: |
          helm upgrade --install smartcart ./helm/smartcart \
            --namespace smartcart \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            --set env.NODE_ENV=production \
            --set replicaCount=3 \
            --set autoscaling.minReplicas=3 \
            --set autoscaling.maxReplicas=10 \
            --atomic --timeout=300s
          echo "✅ Deployed to Production successfully!"

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/smartcart-backend \
            --namespace smartcart --timeout=120s
          echo "✅ Rollout verified!"