apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcart-backend
  namespace: smartcart
  labels:
    app: smartcart-backend
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: smartcart-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: smartcart-backend
    spec:
      containers:
        - name: smartcart-backend
          image: smartcart-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartcart-secrets
                  key: jwt-secret
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartcart-config
                  key: db-host
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: smartcart-backend-service
  namespace: smartcart
spec:
  selector:
    app: smartcart-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smartcart-backend-hpa
  namespace: smartcart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartcart-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80