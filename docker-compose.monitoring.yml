version: "3.8"

services:

  # ── PROMETHEUS ─────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: smartcart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-config.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - monitoring

  # ── GRAFANA ────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: smartcart-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  # ── LOKI (Log Aggregation) ─────────────────────
  loki:
    image: grafana/loki:latest
    container_name: smartcart-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - monitoring

  # ── PROMTAIL (Log Shipper) ─────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: smartcart-promtail
    volumes:
      - ./logs:/var/log/smartcart
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  grafana-data:
  loki-data:

networks:
  monitoring:
    driver: bridge